name: PR

on:
  pull_request:
    types: [opened, edited, reopened, synchronize]

permissions:
  contents: read
  pull-requests: read

jobs:
  # The repo squash-merges with the PR title as the commit subject, so the title
  # must be a valid Conventional Commit. This is the required check that guards
  # what lands on master.
  title:
    name: Validate PR title
    runs-on: ubuntu-latest
    steps:
      - uses: amannn/action-semantic-pull-request@v5
        env:
          GITHUB_TOKEN: ${{ github.token }}
        with:
          types: |
            feat
            fix
            perf
            refactor
            docs
            build
            revert
            ci
            test
            chore
            style
          requireScope: false
          # Subject must not start with an uppercase letter (Conventional Commits style).
          subjectPattern: ^(?![A-Z]).+$
          subjectPatternError: "The PR title subject must start with a lowercase letter, e.g. \"fix: correct the thing\"."

  # Advisory: individual commit messages are discarded by squash-merge, but this
  # surfaces sloppy history early. Not a required check.
  commits:
    name: Lint commit messages
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: oven-sh/setup-bun@v2
      - run: bun install --frozen-lockfile
      - name: commitlint
        run: bunx commitlint --from "${{ github.event.pull_request.base.sha }}" --to "${{ github.event.pull_request.head.sha }}" --verbose
